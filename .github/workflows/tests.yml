name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-caching: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Type check
        run: uv run pyright

      - name: Run tests
        run: uv run pytest
